    <!-- Mobile Menu -->

    <!-- ==================== GALLERY SECTION ==================== -->
    <section id="gallery" class="py-20 bg-black/50">

    <!-- ==================== LIGHTBOX ==================== -->
    <div id="lightbox" class="lightbox">
        <button id="lightbox-close" class="absolute top-4 left-4 text-white text-3xl hover:text-primary transition-colors z-10">

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // ========== UTILITY FUNCTIONS ==========
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        // ========== DARK MODE ==========
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // ========== HEADER SCROLL EFFECT ==========
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('header-scrolled');
            } else {
                header.classList.remove('header-scrolled');
            }
        });

        // ========== MOBILE MENU ==========
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMobileMenu = document.getElementById('close-mobile-menu');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileOverlay = document.getElementById('mobile-overlay');

        function openMobileMenu() {
            mobileMenu.classList.add('active');
            mobileOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenuFunc() {
            mobileMenu.classList.remove('active');
            mobileOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        mobileMenuBtn.addEventListener('click', openMobileMenu);
        closeMobileMenu.addEventListener('click', closeMobileMenuFunc);
        mobileOverlay.addEventListener('click', closeMobileMenuFunc);

        // Close menu on link click
        document.querySelectorAll('.mobile-nav-link').forEach(link => {
            link.addEventListener('click', closeMobileMenuFunc);
        });

        // ========== SMOOTH SCROLL ==========
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function(e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });

        // ========== HERO CAROUSEL ==========
        let heroCurrentSlide = 0;
        const heroTrack = document.getElementById('hero-carousel-track');
        const heroDotsContainer = document.getElementById('hero-dots');

       async function initHeroCarousel(Media) {

           
           const featuredMedia = Media.filter(item=>item.special);
           console.log("init",featuredMedia)
            

            featuredMedia.forEach((item, index) => {
                console.log("index",index,":",item.url)
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `
                    <img src="${item.url}" alt="${item.name}" class="w-full h-64 md:h-96 object-fit">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                    <div class="absolute bottom-4 right-4 text-right">
                        <h3 class="text-white text-xl font-bold">${item.name}</h3>
                        <p class="text-white/70 text-sm">${item.description}</p>
                    </div>
                `;
                heroTrack.appendChild(slide);

                // Create dot
                const dot = document.createElement('button');
                dot.className = `w-2 h-2 rounded-full transition-all ${index === 0 ? 'bg-primary w-6' : 'bg-white/50'}`;
                dot.addEventListener('click', () => goToHeroSlide(index));
                heroDotsContainer.appendChild(dot);
            });
        }

        function goToHeroSlide(index) {
            const slides = heroTrack.querySelectorAll('.carousel-slide');
            heroCurrentSlide = index;
            if (heroCurrentSlide >= slides.length) heroCurrentSlide = 0;
            if (heroCurrentSlide < 0) heroCurrentSlide = slides.length - 1;

            heroTrack.style.transform = `translateX(${heroCurrentSlide * 100}%)`;

            // Update dots
            const dots = heroDotsContainer.querySelectorAll('button');
            dots.forEach((dot, i) => {
                if (i === heroCurrentSlide) {
                    dot.className = 'w-6 h-2 rounded-full bg-primary transition-all';
                } else {
                    dot.className = 'w-2 h-2 rounded-full bg-white/50 transition-all';
                }
            });
        }

        document.getElementById('hero-prev').addEventListener('click', () => goToHeroSlide(heroCurrentSlide - 1));
        document.getElementById('hero-next').addEventListener('click', () => goToHeroSlide(heroCurrentSlide + 1));

        // Auto slide
        setInterval(() => goToHeroSlide(heroCurrentSlide + 1), 5000);

        // Touch swipe for hero carousel
        let heroTouchStartX = 0;
        let heroTouchEndX = 0;

        heroTrack.addEventListener('touchstart', (e) => {
            heroTouchStartX = e.changedTouches[0].screenX;
        });

        heroTrack.addEventListener('touchend', (e) => {
            heroTouchEndX = e.changedTouches[0].screenX;
            if (heroTouchStartX - heroTouchEndX > 50) {
                goToHeroSlide(heroCurrentSlide + 1);
            } else if (heroTouchEndX - heroTouchStartX > 50) {
                goToHeroSlide(heroCurrentSlide - 1);
            }
        });

        // ========== GALLERY ==========
        let currentView = 'grid';
        let currentCategory = 'all';
        let currentSort = 'newest';
        let filteredMedia = []



         function init_filter(media) {
            filteredMedia=[...media]
        }

       async function getAllCategories(Media) {
        const allCat=await fetchData("all_categories","images")
            
            const categories = new Set();

             allCat.forEach(item=>{
                console.log(item.name)
            categories.add(item.name)
        })

            // Media.forEach(item => {
            //     item.category.forEach(cat => categories.add(cat));
            // });
            let arr=Array.from(categories)
            console.log("arr:",arr)
            return arr;
        }

         function initCategoryFilters(Media,allcat) {
            const container = document.getElementById('category-filters');
            const categories = allcat;

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn px-4 py-2 rounded-full text-sm';
                btn.dataset.category = cat;
                btn.textContent = cat;
                btn.addEventListener('click', () => filterByCategory(cat));
                container.appendChild(btn);
            });
        }

        async function filterByCategory(category) {
            console.log(category,"cat")
            
            
            
            currentCategory = category;
            let cleanname;
            
            
            
            if(currentCategory!="all"){
            const all_cat=await fetchData("all_categories","images")
            const {data,name}=all_cat.filter(item=>item.name==category)[0]
            cleanname=data.replace("/data/images/","").replace(".json","")
            console.log(cleanname)
        }
        else{
            cleanname="all_media"
            }
            

            // Update active state
            document.querySelectorAll('#category-filters .filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.category === category);
            });

            const Media=await fetchData(cleanname,"images")

            const currenMeddia=Media.map(item=>{if (currentCategory==="all"||item.category.includes(currentCategory)){return item}}).filter(item=>item!==undefined);
            updateGallery(currenMeddia);
        }

        function sortMedia(media, sortType) {
            return [...media].sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return sortType === 'newest' ? dateB - dateA : dateA - dateB;
            });
        }

       async function updateGallery(Media) {
            // Filter
            if (currentCategory === 'all') {
                filteredMedia = [...Media];
            } else {

                filteredMedia = Media.filter(item => item.category.includes(currentCategory));
            }

            // Sort
            filteredMedia = sortMedia(filteredMedia, currentSort);

            renderGallery();
        }

        function renderGallery() {
            console.log("filtered",filteredMedia)
            const grid = document.getElementById('gallery-grid');

            if (currentView === 'grid') {
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6';
            } else {
                grid.className = 'flex flex-col gap-4';
            }


            grid.innerHTML = filteredMedia.map((item, index) => {
                if (currentView === 'grid') {
                    return `
                        <div class="media-item card-hover cursor-pointer opacity-0 animate-fade-in-up"
                             style="animation-delay: ${index * 0.1}s"
                             onclick="openLightbox(${index})">
                            ${item.media_type === 'video'
                                ? `<video src="${item.url}" class="w-full h-64 object-fit" muted></video>
                                   <div class="absolute inset-0 flex items-center justify-center">
                                       <div class="w-16 h-16 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center">
                                           <i class="fas fa-play text-white text-xl"></i>
                                       </div>
                                   </div>`
                                : `<img src="${item.url??""}" alt="${item.name}" class="w-full h-64 object-fit lazy-load" loading="lazy" onload="this.classList.add('loaded')">`
                            }
                            <div class="media-overlay flex flex-col justify-end p-4">
                                <h3 class="text-white font-bold text-lg">${item.name}</h3>
                                <p class="text-white/70 text-sm">${item.category.join(' • ')}</p>
                                <p class="text-white/50 text-xs mt-1">${formatDate(item.date)}</p>
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="flex bg-white/5 rounded-xl overflow-hidden cursor-pointer card-hover opacity-0 animate-fade-in-up"
                             style="animation-delay: ${index * 0.1}s"
                             onclick="openLightbox(${index})">
                            <div class="w-32 h-32 md:w-48 md:h-32 flex-shrink-0">
                                ${item.media_type === 'video'
                                    ? `<video src="${item.url??""}" class="w-full h-full object-fit" muted></video>`
                                    : `<img src="${item.url??""}" alt="${item.name}" class="w-full h-full object-fit lazy-load" loading="lazy" onload="this.classList.add('loaded')">`
                                }
                            </div>
                            <div class="flex-1 p-4 flex flex-col justify-center">
                                <h3 class="text-white font-bold text-lg mb-1">${item.name}</h3>
                                <p class="text-white/70 text-sm mb-2">${item.description}</p>
                                <div class="flex items-center gap-4 text-sm">
                                    <span class="text-primary">${item.category.join(' • ')}</span>
                                    <span class="text-white/50">${formatDate(item.date)}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        // Sort change
        document.getElementById('sort-select').addEventListener('change', (e) => {
            currentSort = e.target.value;
            updateGallery(filteredMedia);
        });

        // View toggle
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                currentView = btn.dataset.view;
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderGallery();
            });
        });

        // ========== LIGHTBOX ==========
        let lightboxCurrentIndex = 0;

        function openLightbox(index) {
            lightboxCurrentIndex = index;
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
            updateLightboxContent();
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }

        function updateLightboxContent() {
            const item = filteredMedia[lightboxCurrentIndex];
            const content = document.getElementById('lightbox-content');

            if (item.media_type === 'video') {
                content.innerHTML = `<video src="${item.url}" class="max-w-full max-h-[80vh] rounded-lg" controls autoplay></video>`;
            } else {
                content.innerHTML = `<img src="${item.url}" alt="${item.name}" class="max-w-full max-h-[80vh] rounded-lg object-contain">`;
            }

            document.getElementById('lightbox-title').textContent = item.name;
            document.getElementById('lightbox-description').textContent = item.description;
        }

        function navigateLightbox(direction) {
            lightboxCurrentIndex += direction;
            if (lightboxCurrentIndex >= filteredMedia.length) lightboxCurrentIndex = 0;
            if (lightboxCurrentIndex < 0) lightboxCurrentIndex = filteredMedia.length - 1;
            updateLightboxContent();
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-prev').addEventListener('click', () => navigateLightbox(-1));
        document.getElementById('lightbox-next').addEventListener('click', () => navigateLightbox(1));

        // Close on background click
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') closeLightbox();
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') navigateLightbox(-1);
            if (e.key === 'ArrowLeft') navigateLightbox(1);
        });

        // Touch swipe for lightbox
        let lightboxTouchStartX = 0;
        document.getElementById('lightbox-content').addEventListener('touchstart', (e) => {
            lightboxTouchStartX = e.changedTouches[0].screenX;
        });
        document.getElementById('lightbox-content').addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            if (lightboxTouchStartX - touchEndX > 50) {
                navigateLightbox(1);
            } else if (touchEndX - lightboxTouchStartX > 50) {
                navigateLightbox(-1);
            }
        });

        // ========== PACKAGES ==========
      
        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', async () => {
            const Media=await fetchData("all_media","images")
            const PhotographerInfo= await fetchData("photographer_info")

            document.getElementById('header-logo-text').textContent = PhotographerInfo.name;

            
            init_filter(Media)
            const all_cat=await getAllCategories()


            initHeroCarousel(Media);
            initCategoryFilters(Media,all_cat);
           await updateGallery(Media);
            // renderPackages();
            // renderSteps();
            // renderPhotographerInfo();
            // renderPolicies();

            // Observe animated elements
            setTimeout(() => {
                document.querySelectorAll('.animate-fade-in-up').forEach(el => {
                    el.style.opacity = '1';
                });
            }, 100);
        });
    </script>
