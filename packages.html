        // ========== UTILITY FUNCTIONS ==========
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function calculateDiscountedPrice(price, discountPercent) {
            return price - (price * discountPercent / 100);
        }

        function generateWhatsAppURL(phone, message) {
            const cleanPhone = phone.replace(/[^0-9]/g, '');
            const encodedMessage = encodeURIComponent(message);
            return `https://wa.me/${cleanPhone}?text=${encodedMessage}`;
        }

        function generateSmsURL(phone, message) {
            const cleanPhone = phone.replace(/[^0-9]/g, '');
            const encodedMessage = encodeURIComponent(message);
            return `sms:${cleanPhone}?body=${encodedMessage}`;
        }

        // ========== DARK MODE ==========
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.add('dark');
        }
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', event => {
            if (event.matches) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        });

        // ========== HEADER SCROLL EFFECT ==========
        const header = document.getElementById('header');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                header.classList.add('header-scrolled');
            } else {
                header.classList.remove('header-scrolled');
            }
        });

        const mobileOverlay = document.getElementById('mobile-overlay');

        function openMobileMenu() {
            mobileMenu.classList.add('active');
            mobileOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenuFunc() {
            mobileMenu.classList.remove('active');
            mobileOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        mobileMenuBtn.addEventListener('click', openMobileMenu);
        closeMobileMenu.addEventListener('click', closeMobileMenuFunc);
        mobileOverlay.addEventListener('click', closeMobileMenuFunc);

        // Close menu on link click

            link.addEventListener('click', closeMobileMenuFunc);
        });

                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });

            });
        });

      async function  orderPackage(packageId) {
            let Packages=await fetchData("packages")
            let PhotographerInfo=await fetchData("photographer_info")
            const pkg = Packages.find(p => p.id === packageId);
            if (!pkg) return;

            const finalPrice = pkg.isDiscount ? calculateDiscountedPrice(pkg.price, pkg.discount_percent) : pkg.price;

            const message = `مرحبا ${PhotographerInfo.name}
أرغب بطلب ${pkg.name}
السعر: ${finalPrice} ${pkg.currency}
مميزات الباقة:
${pkg.features.map(f => `- ${f}`).join('\n')}`;

            const url = generateWhatsAppURL(PhotographerInfo.whatsapp, message);
            window.open(url, '_blank');
        }

            document.getElementById('photographer-email').textContent = PhotographerInfo.email;
            document.getElementById('hero-description').textContent = PhotographerInfo.description.substring(0, 100) + '...';
            document.getElementById('header-logo-text').textContent = PhotographerInfo.name;
            document.getElementById('footer-name').textContent = PhotographerInfo.name;

            // Social Links
            const socialContainer = document.getElementById('social-links');
            const footerSocial = document.getElementById('footer-social');

            const socialLinks = [
                { platform: 'whatsapp', url: `https://wa.me/${PhotographerInfo.whatsapp.replace(/[^0-9]/g, '')}`, icon: 'fab fa-whatsapp' },
                { platform: 'instagram', url: `https://instagram.com/${PhotographerInfo.instagram}`, icon: 'fab fa-instagram' },
                { platform: 'facebook', url: `https://facebook.com/${PhotographerInfo.facebook}`, icon: 'fab fa-facebook-f' },
                { platform: 'email', url: `mailto:${PhotographerInfo.email}`, icon: 'fas fa-envelope' }
            ];

            socialLinks.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url;
                a.target = '_blank';
                a.className = 'social-link text-white';

                socialContainer.appendChild(a);

                const footerLink = a.cloneNode(true);
                footerSocial.appendChild(footerLink);

            // Contact section
            document.getElementById('contact-whatsapp').href = `https://wa.me/${PhotographerInfo.whatsapp.replace(/[^0-9]/g, '')}`;
            document.getElementById('contact-whatsapp-number').textContent = PhotographerInfo.whatsapp;
            document.getElementById('contact-email-link').href = `mailto:${PhotographerInfo.email}`;
            document.getElementById('contact-email-text').textContent = PhotographerInfo.email;
            document.getElementById('quick-contact-btn').href = generateWhatsAppURL(PhotographerInfo.whatsapp, `مرحبا ${PhotographerInfo.name}، أود الاستفسار عن خدمات التصوير.`);
        }

        // ========== POLICIES ==========
        function renderPolicies() {
            const container = document.getElementById('policies-accordion');

            container.innerHTML = Policies.map((policy, index) => `
                <div class="accordion-item opacity-0 animate-fade-in-up" style="animation-delay: ${index * 0.1}s">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <h3 class="font-bold text-lg">${policy.title}</h3>
                        <i class="fas fa-chevron-down accordion-icon transition-transform"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="p-4 text-white/70 leading-relaxed">
                            ${policy.content}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleAccordion(header) {
            const item = header.parentElement;
            item.classList.toggle('active');
        }

        // ========== INTERSECTION OBSERVER FOR ANIMATIONS ==========
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                }
            });
        }, observerOptions);

        // ========== INITIALIZE ==========
        document.addEventListener('DOMContentLoaded', async () => {
        
            const Packages= await fetchData("packages_v2")
            const PhotographerInfo= await fetchData("photographer_info")

            document.getElementById('header-logo-text').textContent = PhotographerInfo.name;

            // updateGallery();
            renderPackages2(Packages,PhotographerInfo);

            // renderPhotographerInfo();
            // renderPolicies();

            // Observe animated elements
            setTimeout(() => {
                document.querySelectorAll('.animate-fade-in-up').forEach(el => {
                    el.style.opacity = '1';
                });
            }, 100);
        });
    </script>
